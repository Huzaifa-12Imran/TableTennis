<!DOCTYPE html>
<html>
<head>
  <title>Remix: 3D Ping Pong Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Press+Start+2P&family=Noto+Serif+JP:wght@200;400&display=swap" rel="stylesheet">
  <style>
    #error-log { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); color: red; padding: 20px; font-family: monospace; z-index: 999999; white-space: pre-wrap; font-size: 16px; display: none; }
    * { margin: 0; padding: 0; outline: none !important; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; outline: none !important; }
    #canvas { position: absolute; top: 0; left: 0; }
    #fps-counter {
      position: fixed; top: 8px; right: 8px; z-index: 99999;
      font-family: 'SF Mono', 'Consolas', monospace; font-size: 11px;
      color: #0f0; background: rgba(0,0,0,0.6); padding: 4px 8px;
      border-radius: 4px; pointer-events: none; line-height: 1.4;
      display: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="fps-counter">FPS: --</div>
  <div id="error-log"></div>
  <script>
    window.onerror = function(msg, url, line, col, error) {
      document.getElementById('error-log').style.display = 'block';
      document.getElementById('error-log').innerText += 'Error: ' + msg + '\nLine: ' + line + '\nCol: ' + col + '\n\n';
    };
    window.addEventListener('unhandledrejection', function(event) {
      document.getElementById('error-log').style.display = 'block';
      document.getElementById('error-log').innerText += 'Promise Rejection: ' + event.reason + '\n\n';
    });
  </script>
  <script type="module" src="/scene.js"></script>
</body>
</html>
